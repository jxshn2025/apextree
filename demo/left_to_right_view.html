<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Left to Right View - Software Team</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apextree.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px 0;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #6e6e6e;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <h2>Software Engineering Team</h2>
    <p class="subtitle">
      Horizontal left-to-right layout showing team structure with role badges (<code>direction: 'left'</code>)
    </p>
    <div id="svg-tree"></div>
    <script>
      const levelColors = {
        lead: {bg: '#EEF2FF', border: '#818CF8', accent: '#6366F1'},
        senior: {bg: '#F0FDF4', border: '#86EFAC', accent: '#22C55E'},
        mid: {bg: '#FFF7ED', border: '#FDBA74', accent: '#F97316'},
        junior: {bg: '#FDF2F8', border: '#F9A8D4', accent: '#EC4899'},
      };

      const makeOpts = (level) => ({
        nodeBGColor: levelColors[level].bg,
        nodeBGColorHover: levelColors[level].bg,
        borderColor: levelColors[level].border,
        borderColorHover: levelColors[level].accent,
      });

      const nodeTemplate = (c) => `
        <div style="
          display: flex;
          align-items: center;
          gap: 10px;
          height: 100%;
          padding: 8px 12px;
          box-sizing: border-box;
        ">
          <img src="${c.imageURL}" alt="" style="
            width: 36px; height: 36px; border-radius: 50%;
            object-fit: cover; flex-shrink: 0;
          " />
          <div style="min-width: 0; flex: 1;">
            <div style="font-weight: 600; font-size: 12px; line-height: 1.3; color: #1e293b;">${c.name}</div>
            <div style="font-size: 10px; color: #64748b; margin-top: 1px;">${c.role}</div>
          </div>
          <span style="
            font-size: 9px; font-weight: 500;
            padding: 2px 6px; border-radius: 999px;
            background: ${c.badgeColor}; color: #fff;
            white-space: nowrap; flex-shrink: 0;
          ">${c.badge}</span>
        </div>`;

      const data = {
        id: 'eng_lead',
        data: {
          name: 'Priya Sharma',
          role: 'Engineering Lead',
          imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Priya%20Sharma',
          badge: 'Lead',
          badgeColor: '#6366F1',
        },
        options: makeOpts('lead'),
        children: [
          {
            id: 'frontend_lead',
            data: {
              name: 'James Chen',
              role: 'Frontend Lead',
              imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=James%20Chen',
              badge: 'Senior',
              badgeColor: '#22C55E',
            },
            options: makeOpts('senior'),
            children: [
              {
                id: 'fe_1',
                data: {
                  name: 'Sofia Rivera',
                  role: 'React Developer',
                  imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Sofia%20Rivera',
                  badge: 'Mid',
                  badgeColor: '#F97316',
                },
                options: makeOpts('mid'),
              },
              {
                id: 'fe_2',
                data: {
                  name: 'Tom Ashford',
                  role: 'UI Engineer',
                  imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Tom%20Ashford',
                  badge: 'Junior',
                  badgeColor: '#EC4899',
                },
                options: makeOpts('junior'),
              },
            ],
          },
          {
            id: 'backend_lead',
            data: {
              name: 'Amara Okafor',
              role: 'Backend Lead',
              imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Amara%20Okafor',
              badge: 'Senior',
              badgeColor: '#22C55E',
            },
            options: makeOpts('senior'),
            children: [
              {
                id: 'be_1',
                data: {
                  name: 'Erik Lindqvist',
                  role: 'API Engineer',
                  imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Erik%20Lindqvist',
                  badge: 'Mid',
                  badgeColor: '#F97316',
                },
                options: makeOpts('mid'),
              },
              {
                id: 'be_2',
                data: {
                  name: 'Mei-Lin Wu',
                  role: 'Database Engineer',
                  imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Mei-Lin%20Wu',
                  badge: 'Mid',
                  badgeColor: '#F97316',
                },
                options: makeOpts('mid'),
              },
              {
                id: 'be_3',
                data: {
                  name: 'Carlos Vega',
                  role: 'DevOps Engineer',
                  imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Carlos%20Vega',
                  badge: 'Junior',
                  badgeColor: '#EC4899',
                },
                options: makeOpts('junior'),
              },
            ],
          },
          {
            id: 'qa_lead',
            data: {
              name: 'Nadia Petrova',
              role: 'QA Lead',
              imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Nadia%20Petrova',
              badge: 'Senior',
              badgeColor: '#22C55E',
            },
            options: makeOpts('senior'),
            children: [
              {
                id: 'qa_1',
                data: {
                  name: 'Ren Takahashi',
                  role: 'Test Automation',
                  imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Ren%20Takahashi',
                  badge: 'Mid',
                  badgeColor: '#F97316',
                },
                options: makeOpts('mid'),
              },
            ],
          },
        ],
      };

      const options = {
        contentKey: 'data',
        nodeTemplate,
        width: '100%',
        viewPortWidth: 1000,
        viewPortHeight: 520,
        nodeWidth: 200,
        nodeHeight: 54,
        childrenSpacing: 80,
        siblingSpacing: 12,
        direction: 'left',
        edgeStyle: 'curved',
        edgeWidth: 2,
        edgeColor: '#C7D2FE',
        enableExpandCollapse: false,
        canvasStyle: 'border: 1px solid #e0e0e0; border-radius: 8px; background: #fafbfc;',
      };

      const tree = new ApexTree(document.getElementById('svg-tree'), options);
      tree.render(data);
    </script>
  </body>
</html>
