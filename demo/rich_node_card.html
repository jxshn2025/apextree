<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApexTree - Rich Node Cards</title>
    <script src="../apextree.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f5f7fb;
        color: #101828;
        min-height: 100vh;
        max-width: 1000px;
        margin: 0 auto;
      }

      .page-header {
        padding: 24px 32px 16px;
        background: #ffffff;
        border-bottom: 1px solid #e4e7ec;
      }

      .page-header h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .page-header p {
        font-size: 14px;
        color: #475467;
      }

      .page-header .legend {
        display: inline-flex;
        gap: 16px;
        margin-top: 12px;
        flex-wrap: wrap;
      }

      .page-header .legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #475467;
      }

      .page-header .legend i {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 2px;
      }

      #svg-tree {
        margin: 24px auto;
      }
    </style>
  </head>
  <body>
    <div class="page-header">
      <h1>Rich Node Cards</h1>
      <p>
        The built-in template understands the <code>OrgNodeData</code> shape: avatar, title, subtitle, badge, and an
        optional <code>accentColor</code> stripe for categorising departments.
      </p>
      <div class="legend">
        <span><i style="background: #5c6bc0"></i> Executive</span>
        <span><i style="background: #10b981"></i> Engineering</span>
        <span><i style="background: #f59e0b"></i> Finance</span>
        <span><i style="background: #ec4899"></i> People</span>
      </div>
    </div>

    <div id="svg-tree"></div>

    <script>
      const data = {
        id: 'ceo',
        data: {
          imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Alex%20Morgan',
          name: 'Alex Morgan',
          title: 'Chief Executive Officer',
          subtitle: 'Executive Team',
          badge: {text: 'CEO', color: '#EEF2FF'},
          accentColor: '#5C6BC0',
        },
        children: [
          {
            id: 'cto',
            data: {
              imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Sam%20Reyes',
              name: 'Sam Reyes',
              title: 'Chief Technology Officer',
              subtitle: 'Engineering',
              badge: {text: 'CTO', color: '#ECFDF3'},
              accentColor: '#10B981',
            },
            children: [
              {
                id: 'eng-1',
                data: {
                  imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Priya%20Shah',
                  name: 'Priya Shah',
                  title: 'VP, Platform',
                  subtitle: 'Infra & Services',
                  accentColor: '#10B981',
                },
              },
              {
                id: 'eng-2',
                data: {
                  imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Marco%20Rossi',
                  name: 'Marco Rossi',
                  title: 'VP, Product Eng',
                  subtitle: 'Web & Mobile',
                  accentColor: '#10B981',
                },
              },
            ],
          },
          {
            id: 'cfo',
            data: {
              imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Jordan%20Liu',
              name: 'Jordan Liu',
              title: 'Chief Financial Officer',
              subtitle: 'Finance',
              badge: {text: 'CFO', color: '#FFF7E6'},
              accentColor: '#F59E0B',
            },
            children: [
              {
                id: 'fin-1',
                data: {
                  imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Ada%20Fischer',
                  name: 'Ada Fischer',
                  title: 'Director, FP&A',
                  subtitle: 'Finance',
                  accentColor: '#F59E0B',
                },
              },
            ],
          },
          {
            id: 'cpo',
            data: {
              imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Riley%20Chen',
              name: 'Riley Chen',
              title: 'Chief People Officer',
              subtitle: 'People & Culture',
              badge: {text: 'CPO', color: '#FCEEF3'},
              accentColor: '#EC4899',
            },
            children: [
              {
                id: 'hr-1',
                data: {
                  imageURL: 'https://api.dicebear.com/9.x/initials/svg?seed=Noa%20Bennett',
                  name: 'Noa Bennett',
                  title: 'Head of Talent',
                  subtitle: 'People & Culture',
                  accentColor: '#EC4899',
                },
              },
            ],
          },
        ],
      };

      const options = {
        contentKey: 'data',
        width: '100%',
        viewPortWidth: 1000,
        viewPortHeight: 640,
        nodeWidth: 260,
        nodeHeight: 78,
        childrenSpacing: 70,
        siblingSpacing: 30,
        direction: 'top',
        edgeStyle: 'curved',
        enableToolbar: true,
      };

      const container = document.getElementById('svg-tree');
      const tree = new ApexTree(container, options);
      tree.render(data);
    </script>
  </body>
</html>
