<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic View Change - Product Team</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="../apextree.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px 0;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #6e6e6e;
        margin-bottom: 16px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      .toolbar button {
        padding: 6px 14px;
        border: 1px solid #d6d3d1;
        border-radius: 6px;
        background: #fafaf9;
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: #44403c;
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .toolbar button:hover {
        background: #f5f5f4;
        border-color: #a8a29e;
      }
      .toolbar button.active {
        background: #292524;
        color: #fafaf9;
        border-color: #292524;
      }
      .toolbar .separator {
        width: 1px;
        height: 24px;
        background: #d6d3d1;
        margin: 0 4px;
      }
    </style>
  </head>
  <body>
    <h2>Product Team Structure</h2>
    <p class="subtitle">
      Switch layout direction dynamically with the
      <code>changeLayout()</code> and <code>fitScreen()</code> API methods
    </p>
    <div class="toolbar">
      <button id="btn-top" class="active">&darr; Top to Bottom</button>
      <button id="btn-bottom">&uarr; Bottom to Top</button>
      <button id="btn-left">&rarr; Left to Right</button>
      <button id="btn-right">&larr; Right to Left</button>
      <div class="separator"></div>
      <button id="btn-fit">Fit to Screen</button>
    </div>
    <div id="svg-tree"></div>
    <script>
      const teams = {
        exec: {bg: '#F8FAFC', border: '#94A3B8', borderHover: '#475569', accent: '#475569'},
        product: {bg: '#EEF2FF', border: '#A5B4FC', borderHover: '#6366F1', accent: '#6366F1'},
        eng: {bg: '#ECFDF5', border: '#6EE7B7', borderHover: '#10B981', accent: '#10B981'},
        design: {bg: '#FDF2F8', border: '#F9A8D4', borderHover: '#EC4899', accent: '#EC4899'},
        data: {bg: '#FFF7ED', border: '#FDBA74', borderHover: '#F97316', accent: '#F97316'},
      };

      const makeOpts = (t) => ({
        nodeBGColor: teams[t].bg,
        nodeBGColorHover: teams[t].bg,
        borderColor: teams[t].border,
        borderColorHover: teams[t].borderHover,
      });

      const nodeTemplate = (c) => `
        <div style="
          display: flex;
          flex-direction: column;
          align-items: center;
          height: 100%;
          padding: 10px 8px 8px;
          box-sizing: border-box;
          text-align: center;
          overflow: hidden;
        ">
          <img src="${c.img}" alt=""
            style="
              width: 40px; height: 40px;
              border-radius: 50%;
              object-fit: cover;
              flex-shrink: 0;
              border: 2px solid ${c.accent};
              margin-bottom: 6px;
            " />
          <div style="font-weight: 600; font-size: 11px; color: #1c1917; line-height: 1.3;">${c.name}</div>
          <div style="font-size: 9px; color: #78716c; margin-top: 2px;">${c.role}</div>
          <div style="font-size: 8px; color: #a8a29e; margin-top: 1px;">${c.team}</div>
        </div>`;

      const data = {
        id: 'cpo',
        data: {
          name: 'Elena Vasquez',
          role: 'Chief Product Officer',
          team: 'Executive',
          img: 'https://api.dicebear.com/9.x/initials/svg?seed=Elena%20Vasquez',
          accent: teams.exec.accent,
        },
        options: makeOpts('exec'),
        children: [
          {
            id: 'pm_lead',
            data: {
              name: 'David Kim',
              role: 'VP of Product',
              team: 'Product',
              img: 'https://api.dicebear.com/9.x/initials/svg?seed=David%20Kim',
              accent: teams.product.accent,
            },
            options: makeOpts('product'),
            children: [
              {
                id: 'pm1',
                data: {
                  name: 'Sophie Laurent',
                  role: 'Sr. Product Manager',
                  team: 'Core Platform',
                  img: 'https://api.dicebear.com/9.x/initials/svg?seed=Sophie%20Laurent',
                  accent: teams.product.accent,
                },
                options: makeOpts('product'),
              },
              {
                id: 'pm2',
                data: {
                  name: 'Raj Patel',
                  role: 'Product Manager',
                  team: 'Growth',
                  img: 'https://api.dicebear.com/9.x/initials/svg?seed=Raj%20Patel',
                  accent: teams.product.accent,
                },
                options: makeOpts('product'),
              },
              {
                id: 'pm3',
                data: {
                  name: 'Mia Torres',
                  role: 'Product Manager',
                  team: 'Enterprise',
                  img: 'https://api.dicebear.com/9.x/initials/svg?seed=Mia%20Torres',
                  accent: teams.product.accent,
                },
                options: makeOpts('product'),
              },
            ],
          },
          {
            id: 'eng_lead',
            data: {
              name: 'Marcus Chen',
              role: 'VP of Engineering',
              team: 'Engineering',
              img: 'https://api.dicebear.com/9.x/initials/svg?seed=Marcus%20Chen',
              accent: teams.eng.accent,
            },
            options: makeOpts('eng'),
            children: [
              {
                id: 'eng1',
                data: {
                  name: 'Priya Sharma',
                  role: 'Staff Engineer',
                  team: 'Platform',
                  img: 'https://api.dicebear.com/9.x/initials/svg?seed=Priya%20Sharma',
                  accent: teams.eng.accent,
                },
                options: makeOpts('eng'),
              },
              {
                id: 'eng2',
                data: {
                  name: 'Tomasz Nowak',
                  role: 'Sr. Engineer',
                  team: 'Backend',
                  img: 'https://api.dicebear.com/9.x/initials/svg?seed=Tomasz%20Nowak',
                  accent: teams.eng.accent,
                },
                options: makeOpts('eng'),
              },
            ],
          },
          {
            id: 'design_lead',
            data: {
              name: 'Camille Dubois',
              role: 'Head of Design',
              team: 'Design',
              img: 'https://api.dicebear.com/9.x/initials/svg?seed=Camille%20Dubois',
              accent: teams.design.accent,
            },
            options: makeOpts('design'),
            children: [
              {
                id: 'des1',
                data: {
                  name: 'Yuki Tanabe',
                  role: 'Sr. Product Designer',
                  team: 'UX',
                  img: 'https://api.dicebear.com/9.x/initials/svg?seed=Yuki%20Tanabe',
                  accent: teams.design.accent,
                },
                options: makeOpts('design'),
              },
              {
                id: 'des2',
                data: {
                  name: 'Aisha Kofi',
                  role: 'UI Designer',
                  team: 'Visual',
                  img: 'https://api.dicebear.com/9.x/initials/svg?seed=Aisha%20Kofi',
                  accent: teams.design.accent,
                },
                options: makeOpts('design'),
              },
            ],
          },
          {
            id: 'data_lead',
            data: {
              name: 'Javier Moreno',
              role: 'Head of Data',
              team: 'Data & Analytics',
              img: 'https://api.dicebear.com/9.x/initials/svg?seed=Javier%20Moreno',
              accent: teams.data.accent,
            },
            options: makeOpts('data'),
            children: [
              {
                id: 'data1',
                data: {
                  name: 'Nadia Volkov',
                  role: 'Data Scientist',
                  team: 'ML',
                  img: 'https://api.dicebear.com/9.x/initials/svg?seed=Nadia%20Volkov',
                  accent: teams.data.accent,
                },
                options: makeOpts('data'),
              },
            ],
          },
        ],
      };

      const options = {
        contentKey: 'data',
        nodeTemplate,
        width: '100%',
        viewPortWidth: 1000,
        viewPortHeight: 640,
        nodeWidth: 140,
        nodeHeight: 120,
        childrenSpacing: 70,
        siblingSpacing: 14,
        direction: 'top',
        edgeStyle: 'orthogonal',
        edgeWidth: 1,
        enableExpandCollapse: false,
        canvasStyle: 'border: 1px solid #e0e0e0; border-radius: 8px; background: #fafaf9;',
      };

      const tree = new ApexTree(document.getElementById('svg-tree'), options);
      const graph = tree.render(data);

      const buttons = {
        top: document.getElementById('btn-top'),
        bottom: document.getElementById('btn-bottom'),
        left: document.getElementById('btn-left'),
        right: document.getElementById('btn-right'),
      };

      function setDirection(dir) {
        Object.values(buttons).forEach((b) => b.classList.remove('active'));
        buttons[dir].classList.add('active');
        graph.changeLayout(dir);
      }

      buttons.top.addEventListener('click', () => setDirection('top'));
      buttons.bottom.addEventListener('click', () => setDirection('bottom'));
      buttons.left.addEventListener('click', () => setDirection('left'));
      buttons.right.addEventListener('click', () => setDirection('right'));

      document.getElementById('btn-fit').addEventListener('click', () => {
        graph.fitScreen();
      });
    </script>
  </body>
</html>
